<!-- Sidebar – TrustLens AI -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo gradient-text">
    <i class="bi bi-shield-fill-check me-2"></i>TrustLens AI
  </div>

  <div class="mb-2 px-2">
    <small style="font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Main</small>
  </div>

  <a href="{{ url_for('dashboard') }}" class="sidebar-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
    <i class="bi bi-grid-1x2-fill"></i> Dashboard
  </a>

  <div class="mb-2 mt-3 px-2">
    <small style="font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Scan Tools</small>
  </div>

  <a href="{{ url_for('fake_job') }}" class="sidebar-link {% if request.endpoint == 'fake_job' %}active{% endif %}">
    <i class="bi bi-briefcase-fill"></i> Fake Job Detector
  </a>
  <a href="{{ url_for('scam_message') }}" class="sidebar-link {% if request.endpoint == 'scam_message' %}active{% endif %}">
    <i class="bi bi-chat-dots-fill"></i> Scam Message
  </a>
  <a href="{{ url_for('rbi_sebi') }}" class="sidebar-link {% if request.endpoint == 'rbi_sebi' %}active{% endif %}">
    <i class="bi bi-bank2"></i> RBI/SEBI Verify
  </a>
  <a href="{{ url_for('loan_app') }}" class="sidebar-link {% if request.endpoint == 'loan_app' %}active{% endif %}">
    <i class="bi bi-currency-rupee"></i> Loan App Detector
  </a>
  <a href="{{ url_for('website_scanner') }}" class="sidebar-link {% if request.endpoint == 'website_scanner' %}active{% endif %}">
    <i class="bi bi-globe2"></i> Website Scanner
  </a>
  <a href="{{ url_for('qr_scanner') }}" class="sidebar-link {% if request.endpoint == 'qr_scanner' %}active{% endif %}">
    <i class="bi bi-qr-code-scan"></i> QR Scanner
  </a>
  <a href="{{ url_for('app_analyzer') }}" class="sidebar-link {% if request.endpoint == 'app_analyzer' %}active{% endif %}">
    <i class="bi bi-phone-fill"></i> App Analyzer
  </a>

  <div class="mb-2 mt-3 px-2">
    <small style="font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Community</small>
  </div>

  <a href="{{ url_for('threat_map') }}" class="sidebar-link {% if request.endpoint == 'threat_map' %}active{% endif %}">
    <i class="bi bi-geo-alt-fill"></i> Threat Map
    <span style="font-size:.65rem;background:rgba(255,51,102,0.2);color:var(--neon-red);padding:1px 6px;border-radius:10px;margin-left:auto;">LIVE</span>
  </a>
  <a href="{{ url_for('report_fraud') }}" class="sidebar-link {% if request.endpoint == 'report_fraud' %}active{% endif %}">
    <i class="bi bi-flag-fill"></i> Report Fraud
  </a>
  <a href="{{ url_for('history') }}" class="sidebar-link {% if request.endpoint == 'history' %}active{% endif %}">
    <i class="bi bi-clock-history"></i> Scan History
  </a>

  <!-- User card at bottom -->
  <div style="position:absolute;bottom:24px;left:16px;right:16px;">
    <div class="glass-card" style="padding:14px !important;">
      <div class="d-flex align-items-center gap-2 mb-2">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;">
          {{ session.username[0].upper() if session.username else 'U' }}
        </div>
        <div style="overflow:hidden;">
          <div style="font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ session.username }}</div>
          <div class="live-indicator"><span class="live-dot"></span>Active</div>
        </div>
      </div>
      <a href="{{ url_for('logout') }}" class="btn btn-sm w-100"
         style="background:rgba(255,51,102,0.12);color:var(--neon-red);border:1px solid rgba(255,51,102,.2);border-radius:8px;font-size:.8rem;">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </div>
</div>

<!-- Mobile toggle -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <i class="bi bi-list"></i>
</button>
